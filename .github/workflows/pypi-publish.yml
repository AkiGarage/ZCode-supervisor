name: PyPI package release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string
      publish_target:
        description: "Build only by default; publish only after explicit approval"
        required: true
        default: build-only
        type: choice
        options:
          - build-only
          - testpypi
          - pypi
      trusted_publishers_configured:
        description: "Required for publish targets after pending publishers are configured in PyPI/TestPyPI"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build and verify Python distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate tag format
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must look like v0.1.0" >&2
            exit 1
          fi
          git show-ref --verify --quiet "refs/tags/${TAG}"
          git rev-parse -q --verify "refs/tags/${TAG}^{commit}" >/dev/null

      - name: Run repository checks
        run: bash scripts/check.sh

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Verify wheel contents
        run: python scripts/verify-python-wheel dist/*.whl

      - name: Attest Python distributions
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  preflight-testpypi:
    name: Check TestPyPI release readiness
    if: inputs.publish_target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Require manual Trusted Publisher confirmation
        if: inputs.trusted_publishers_configured != true
        run: |
          scripts/check-pypi-release-readiness --target testpypi || true
          echo "::error::Set trusted_publishers_configured=true only after creating pending publishers on TestPyPI and PyPI."
          exit 1

      - name: Run TestPyPI readiness preflight
        run: |
          scripts/check-pypi-release-readiness \
            --target testpypi \
            --tag "$TAG" \
            --version "${TAG#v}" \
            --trusted-publishers-configured

  preflight-pypi:
    name: Check PyPI release readiness
    if: inputs.publish_target == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Require manual Trusted Publisher confirmation
        if: inputs.trusted_publishers_configured != true
        run: |
          scripts/check-pypi-release-readiness --target pypi || true
          echo "::error::Set trusted_publishers_configured=true only after TestPyPI is verified and the PyPI pending publisher exists."
          exit 1

      - name: Run PyPI readiness preflight
        run: |
          scripts/check-pypi-release-readiness \
            --target pypi \
            --tag "$TAG" \
            --version "${TAG#v}" \
            --trusted-publishers-configured

  publish-testpypi:
    name: Publish to TestPyPI
    if: inputs.publish_target == 'testpypi'
    needs:
      - build
      - preflight-testpypi
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/zcode-supervisor
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: inputs.publish_target == 'pypi'
    needs:
      - build
      - preflight-pypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zcode-supervisor
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
